# ╔══════════════════════════════════════════════╗
# ║       i3blocks config — D4rkC4rl             ║
# ║       Theme: HackTheBox / Dark               ║
# ╚══════════════════════════════════════════════╝

# ── Global ────────────────────────────────────────
command=~/.config/i3/i3blocks-contrib/$BLOCK_NAME/$BLOCK_NAME
separator_block_width=20
separator=false
markup=none

# ── Identité ──────────────────────────────────────
[username]
command=echo " D4rkC4rl"
interval=once
color=#9fef00

# ── Clipboard ─────────────────────────────────────
[clipboard]
command=echo " $(greenclip print | head -1 | cut -c1-25)"
interval=2
color=#ffaf00

# ── CPU ───────────────────────────────────────────
[cpu_usage]
label= CPU 
interval=5
min_width= CPU 100.00%
separator=false
color=#a4b1cd

# ── RAM ───────────────────────────────────────────
[memory]
label= RAM 
interval=10
separator=false
color=#a4b1cd

# ── Disque ────────────────────────────────────────
[disk]
label= 
interval=60
color=#a4b1cd

# ── Réseau ────────────────────────────────────────
[bandwidth]
instance=wlan0
label= 
interval=5
color=#5cb2ff

# ── VPN (tun0) — silencieux si absent ─────────────
[iface]
command=ip addr show tun0 2>/dev/null | grep -oP '(?<=inet )[^/]+' | head -1 | xargs -I{} echo " {}" || echo ""
interval=10
color=#2ee7b6
separator=false

# ── Batterie ──────────────────────────────────────
[battery]
command=BAT=$(cat /sys/class/power_supply/BAT1/capacity); STATUS=$(cat /sys/class/power_supply/BAT1/status); if [ "$STATUS" = "Full" ]; then echo " ${BAT}% "; elif [ "$STATUS" = "Charging" ]; then echo " ${BAT}%"; else echo " ${BAT}%"; fi
interval=30
color=#ffcc5c
# ── Heure ─────────────────────────────────────────
[time]
command=echo " $(date '+%a %d %b  %H:%M')"
interval=1
color=#9fef00
align=right
