;=============================================================================
;   Polybar Config — Tobi | Akatsuki no Yami
;   "No one cared who I was until I put on the mask." — Obito Uchiha
;   Machine: i5-1035G1 | 12GB RAM | 1366x768
;   D4rkC4rl
;=============================================================================

[colors]
; Palette Tobi / Akatsuki (reprise exacte du config i3)
bg        = #0d0d0d
bg-trans  = #dd0d0d0d
panel     = #111a14
orange    = #d4620a
orange-t  = #33d4620a
red       = #c0392b
red-t     = #22c0392b
green     = #2a4a32
green-t   = #222a4a32
text      = #c8c8b8
dim       = #2e2e2e
white     = #f0f0f0
; HTB green (depuis i3blocks)
htb       = #9fef00
; bleu réseau (depuis i3blocks)
net-blue  = #5cb2ff
; VPN teal (depuis i3blocks)
vpn-teal  = #2ee7b6
; jaune batterie (depuis i3blocks)
bat-yel   = #ffcc5c
; jaune clipboard (depuis i3blocks)
clip-yel  = #ffaf00

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

; Semi-transparent comme i3bar -t avec background #0d0d0dee
background = ${colors.bg-trans}
foreground = ${colors.text}

line-size = 2
line-color = ${colors.orange}

border-size = 0
padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

; Même font que le config i3
font-0 = "Iosevka Nerd Font:style=Regular:size=10;2"
font-1 = "Iosevka Nerd Font:style=Regular:size=11;3"

modules-left   = i3 xwindow
modules-center = date
modules-right  = clipboard vpn cpu memory disk network battery username

tray-position = none

cursor-click = pointer
cursor-scroll = ns-resize

wm-restack = i3

;=============================================================================
;   MODULES
;=============================================================================

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = false
wrapping-scroll = false

label-mode-padding = 2
label-mode-foreground = ${colors.bg}
label-mode-background = ${colors.orange}

; Workspace actif — orange du masque
label-focused = %name%
label-focused-foreground = ${colors.orange}
label-focused-underline  = ${colors.orange}
label-focused-background = ${colors.orange-t}
label-focused-padding = 2

; Workspace non vide
label-occupied = %name%
label-occupied-foreground = ${colors.text}
label-occupied-padding = 2

; Workspace urgent — rouge Akatsuki
label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-underline  = ${colors.red}
label-urgent-background = ${colors.red-t}
label-urgent-padding = 2

; Workspace vide
label-empty = %name%
label-empty-foreground = ${colors.dim}
label-empty-padding = 2

; ---------------------------------------------------------------------------

[module/xwindow]
type = internal/xwindow
label = %title:0:45:...%
label-foreground = ${colors.dim}
format-prefix = "  "
format-prefix-foreground = ${colors.green}

; ---------------------------------------------------------------------------

[module/date]
type = internal/date
interval = 1

; Même format que i3blocks [time]
date = "%a %d %b"
time = "%H:%M"

format-prefix = " "
format-prefix-foreground = ${colors.htb}
format-foreground = ${colors.htb}

label = %date%  %time%

; ---------------------------------------------------------------------------

[module/username]
type = custom/script
exec = echo "D4rkC4rl"
interval = 0
format-foreground = ${colors.htb}

; ---------------------------------------------------------------------------

[module/clipboard]
type = custom/script
exec = echo " $(greenclip print | head -1 | cut -c1-20 2>/dev/null || echo '')"
interval = 2
format-foreground = ${colors.clip-yel}
click-left = rofi -modi "clipboard:greenclip print" -show clipboard

; ---------------------------------------------------------------------------

[module/cpu]
type = internal/cpu
interval = 5

format-prefix = " CPU "
format-prefix-foreground = ${colors.text}
format = <label>

label = %percentage%%
label-foreground = ${colors.text}

; ---------------------------------------------------------------------------

[module/memory]
type = internal/memory
interval = 10

format-prefix = " RAM "
format-prefix-foreground = ${colors.text}
format = <label>

label = %gb_used%
label-foreground = ${colors.text}

; ---------------------------------------------------------------------------

[module/disk]
type = internal/fs
mount-0 = /
interval = 60

format-mounted-prefix = "  "
format-mounted-prefix-foreground = ${colors.text}
format-mounted = <label-mounted>

label-mounted = %free%
label-mounted-foreground = ${colors.text}

; ---------------------------------------------------------------------------

#[module/network]
#type = internal/network
; wlan0 — repris de i3blocks
#interface = wlan0
#interval = 5

#format-connected-prefix = "  "
#format-connected-prefix-foreground = ${colors.net-blue}
#format-connected = <label-connected>
#label-connected = %essid%  ↓%downspeed:6%
#label-connected-foreground = ${colors.net-blue}

#format-disconnected-prefix = "  "
#format-disconnected-prefix-foreground = ${colors.red}
#format-disconnected = <label-disconnected>
#label-disconnected = no wifi
#label-disconnected-foreground = ${colors.dim}

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 5
format-foreground = ${colors.net-blue}
; ---------------------------------------------------------------------------

[module/vpn]
type = custom/script
; Même logique que i3blocks [iface] — silencieux si tun0 absent
exec = ip addr show tun0 2>/dev/null | grep -oP '(?<=inet )[^/]+' | head -1 | xargs -I{} echo "  {}" || echo ""
interval = 10
format-foreground = ${colors.vpn-teal}

; ---------------------------------------------------------------------------

[module/battery]
type = internal/battery
; BAT1 — repris de i3blocks
battery = BAT1
adapter = AC
full-at = 98
poll-interval = 30

format-charging = <label-charging>
format-charging-prefix = "  "
format-charging-prefix-foreground = ${colors.bat-yel}
label-charging = %percentage%%
label-charging-foreground = ${colors.bat-yel}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.bat-yel}

format-full-prefix = "  "
format-full-prefix-foreground = ${colors.htb}
label-full = Full
label-full-foreground = ${colors.htb}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.orange}
ramp-capacity-2-foreground = ${colors.bat-yel}
ramp-capacity-3-foreground = ${colors.bat-yel}
ramp-capacity-4-foreground = ${colors.htb}
